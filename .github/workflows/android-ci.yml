name: Andrroid CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint check
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the repository
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
          distribution: 'zulu'
          java-version: '21.0.6' # Runs the build engine on Java 21
          cache: 'gradle'       # Accelerates build speeds

    - name: Run Android Lint
      run: ./gradlew lintDebug

    - name: Upload Lint Report Artifact
      uses: actions/upload-artifact@v6
      if: always() # CRITICAL: Ensures the report uploads even if the lint step fails
      with:
          name: android-lint-report
          path:
            "**/build/reports/lint-results-debug.html"
          retention-days: 7

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21.0.6' # Runs the build engine on Java 21
          cache: 'gradle'       # Accelerates build speeds

      - name: Run Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Unit Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always() # CRITICAL: Captures reports even when tests fail
        with:
          name: android-unit-test-report
          path: "**/build/reports/tests/testDebugUnitTest/" # Directs to the HTML test report folder
          retention-days: 7
